# A date-time string at UTC, such as 2007-12-03T10:15:30Z,
#     compliant with the 'date-time' format outlined in section 5.6 of
#     the RFC 3339 profile of the ISO 8601 standard for representation
#     of dates and times using the Gregorian calendar.
scalar DateTime

# The `JSON` scalar type represents JSON values as specified by [ECMA-404](http://www.ecma-international.org/publications/files/ECMA-ST/ECMA-404.pdf).
scalar JSON

type ContentfulTag {
  id: String
  name: String
}

type ContentfulMetadata {
  tags: [ContentfulTag]!
}

interface Entry {
  contentfulMetadata: ContentfulMetadata!
}

type Sys {
  id: String!
}

# Represents a binary file in a space. An asset can be any file type.
type Asset {
  contentfulMetadata: ContentfulMetadata!
  sys: Sys!
  title: String
  description: String
  contentType: String
  fileName: String
  size: Int
  url: String
  width: Int
  height: Int
}

type Video implements Entry {
  sys: Sys!
  contentfulMetadata: ContentfulMetadata!
  name(locale: String): String
  video(locale: String): JSON
}

type Author implements Entry {
  nombreYApellido: String
  photo: Asset
}

type Post implements Entry {
  title: String
  metaTitle: String
  metaDescription: String
  slug: String
  excerpt: String
  date: DateTime
  # category: String
  author: Author
  mainImage: Asset
  content: PostRichtext
}

type PostRichtext {
  json: JSON!
  links: PostRichtextLinks!
}

type PostRichtextLinks {
  assets: PostRichtextAssets!
  entries: PostRichtextEntries!
}

type PostRichtextAssets {
  block: [Asset]!
}

type PostRichtextEntries {
  block: [Entry]!
}
